<!doctype html>
<html lang="en" class="h-full">
<head>
  <script>
    (function() {
        const session = localStorage.getItem('activeDepartment');
        if (!session) window.location.replace('admin.html?error=unauthorized'); 
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAT - Dept Profile</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles2.css">
</head>
<body class="h-full flex bg-[#0a0e1a]">
  
  <aside id="sidebar" class="sidebar flex flex-col h-full theme-border-r theme-surface">
    <div class="h-[76px] px-5 flex items-center shrink-0 theme-border-b">
      <div class="flex items-center gap-3">
        <div class="logo-box bg-orange-600 text-white">B</div>
        <div class="flex flex-col justify-center">
          <div class="logo-text font-bold text-white">BEAT</div>
          <div class="sidebar-subtext">Department Portal</div>
        </div>
      </div>
    </div>
    
    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="dashboard3.html" class="sidebar-item"><i data-lucide="layout-grid"></i><span>Dashboard Overview</span></a>
      <a href="reports3.html" class="sidebar-item"><i data-lucide="file-text"></i><span>Public Reports</span></a>
      <a href="announcements3.html" class="sidebar-item"><i data-lucide="megaphone"></i><span>Announcement Manager</span></a>
      <a href="weather.html" class="sidebar-item"><i data-lucide="thermometer-sun"></i><span>Weather & AQI Alerts</span></a>
      <a href="evacuation.html" class="sidebar-item"><i data-lucide="tent"></i><span>Evacuation Control</span></a>
    </nav>
    
    <div class="user-footer">
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-3">
                <div id="nav-avatar" class="nav-avatar bg-orange-600">D</div>
                <div><div class="user-footer-name">DRRMO</div><div class="user-footer-sub">Disaster Management</div></div>
            </div>
            <a href="profile3.html" class="settings-link active"><i data-lucide="settings" class="icon-md"></i></a>
        </div>
        <button onclick="doLogout()" class="btn-logout"><i data-lucide="log-out" class="icon-sm"></i> Logout</button>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto flex flex-col items-center relative">
    <header class="w-full px-8 h-[76px] flex items-center shrink-0 theme-surface theme-border-b">
      <h1 class="text-xl font-semibold text-white flex items-center gap-2"><i data-lucide="user" class="icon-lg"></i> Department Profile</h1>
    </header>

    <div class="p-8 animate-in w-full max-w-2xl">
      <div class="profile-card rounded-2xl p-10 flex flex-col items-center shadow-lg relative">
        <div class="relative group mb-6">
          <div id="profile-display" class="profile-display-circle bg-orange-600 border border-orange-500/50">D</div>
        </div>

        <div class="text-center mb-10">
          <h2 id="display-name" class="text-white text-2xl font-bold">DRRMO Control</h2>
          <div class="badge-stack">
            <span class="text-[11px] font-bold tracking-widest bg-orange-600/20 text-orange-400 px-3 py-1.5 rounded-full uppercase w-max border border-orange-500/20">DEPT: DISASTER RISK</span>
            <span class="text-[11px] font-bold tracking-widest bg-gray-700/50 text-[#94a3b8] px-3 py-1.5 rounded-full uppercase w-max border border-gray-600/50">ID: 202499112</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app2.js"></script>
  <script>lucide.createIcons(); function doLogout() { localStorage.removeItem('activeDepartment'); window.location.href = 'admin.html'; }</script>
