<!doctype html>
<html lang="en" class="h-full">
<head>
  <script>
    (function() {
        const session = localStorage.getItem('activeDepartment');
        if (!session) window.location.replace('admin.html?error=unauthorized'); 
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAT - Public Reports</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles2.css">
  <style>
    .modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    #modal-confirm-action, #action-success-modal { z-index: 20000 !important; }
  </style>
</head>
<body class="h-full flex bg-[#0a0e1a]">

  <aside id="sidebar" class="sidebar flex flex-col h-full theme-border-r theme-surface">
    <div class="h-[76px] px-5 flex items-center shrink-0 theme-border-b">
      <div class="flex items-center gap-3">
        <div class="logo-box bg-orange-600 text-white">B</div>
        <div class="flex flex-col justify-center">
          <div class="logo-text font-bold text-white">BEAT</div>
          <div class="sidebar-subtext">Department Portal</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="dashboard3.html" class="sidebar-item"><i data-lucide="layout-grid"></i><span>Dashboard Overview</span></a>
      <a href="reports3.html" class="sidebar-item active"><i data-lucide="file-text"></i><span>Public Reports</span></a>
      <a href="announcements3.html" class="sidebar-item"><i data-lucide="megaphone"></i><span>Announcement Manager</span></a>
      <a href="weather.html" class="sidebar-item"><i data-lucide="thermometer-sun"></i><span>Weather & AQI Alerts</span></a>
      <a href="evacuation.html" class="sidebar-item"><i data-lucide="tent"></i><span>Evacuation Control</span></a>
    </nav>
    <div class="user-footer">
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-3"><div id="nav-avatar" class="nav-avatar bg-orange-600">D</div><div><div class="user-footer-name">DRRMO</div><div class="user-footer-sub">Disaster Management</div></div></div>
            <a href="profile3.html" class="settings-link"><i data-lucide="settings" class="icon-md"></i></a>
        </div>
        <button type="button" onclick="doLogout()" class="btn-logout"><i data-lucide="log-out" class="icon-sm"></i> Logout</button>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto flex flex-col">
    <header class="px-8 h-[76px] flex items-center shrink-0 theme-surface theme-border-b">
      <h1 class="text-xl font-semibold text-white flex items-center gap-2"><i data-lucide="file-text" class="icon-lg"></i> Public Reports</h1>
    </header>

    <div class="p-8 flex-1 animate-in">
        <div class="flex flex-wrap gap-4 items-center justify-between mb-8">
            <div class="flex flex-wrap gap-3 items-center">
              <input type="date" id="filter-date" class="h-10 bg-[#1e2536] text-white border border-[#374151] rounded-lg px-3 text-sm outline-none cursor-pointer min-w-[160px]">
            </div>
            <button type="button" onclick="openModal('new-report-modal')" class="h-10 bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-lg text-sm font-bold flex items-center gap-2 shadow-lg"><i data-lucide="plus" class="icon-sm"></i> File Incident</button>
        </div>
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6" id="reports-grid">
            <p class="text-[#94a3b8] text-sm italic">No emergency reports fetched for this view currently.</p>
        </div>
    </div>
  </main>

  <div id="new-report-modal" class="modal-overlay hidden">
    <div class="border theme-border w-[550px] max-w-[90%] rounded-2xl p-8 shadow-2xl theme-surface">
      <h2 class="text-white font-bold text-xl mb-6 flex items-center gap-2 justify-center"><i data-lucide="file-plus" class="text-blue-500 icon-lg"></i> Submit Incident</h2>
      <button type="button" onclick="closeModal('new-report-modal')" class="w-full bg-[#1e2536] border theme-border text-white font-bold py-2.5 rounded-xl text-sm">Cancel</button>
    </div>
  </div>

  <script src="js/app2.js"></script>
  <script>lucide.createIcons(); function doLogout() { localStorage.removeItem('activeDepartment'); window.location.href = 'admin.html'; }</script>
</body>
</html>
