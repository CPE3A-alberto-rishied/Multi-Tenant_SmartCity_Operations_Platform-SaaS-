<!doctype html>
<html lang="en" class="h-full">
<head>
  <script>
   (function() {
        const session = localStorage.getItem('activeDepartment');
        if (!session || session !== 'DRRMO') { // Also secured specifically for DRRMO
            window.location.replace('admin.html?error=unauthorized'); 
        }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BEAT - Public Reports</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles2.css">
  <style>
    .modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    #modal-confirm-action, #action-success-modal { z-index: 20000 !important; }
  </style>
</head>
<body class="h-full flex bg-[#0a0e1a] overflow-hidden">

  <div id="mobile-overlay" class="fixed inset-0 bg-black/60 z-[55] hidden md:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

  <aside id="sidebar" class="sidebar flex flex-col h-full theme-border-r theme-surface z-[60] fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 w-64 bg-[#0a0e1a]">
    <div class="h-[76px] px-5 flex items-center shrink-0 theme-border-b">
        <div id="auth-logo" class="flex items-center gap-1.5">
            <img src="/assets/beat_logo2.png" alt="BEAT Logo" class="w-[52px] h-14 object-contain">
            <div class="flex flex-col justify-center items-start">
                <img src="/assets/beat_text2.png" alt="BEAT" class="w-[40px] object-contain object-left mb-1">
                <div style="color:#94a3b8; font-size:11px" class="leading-none">DRRMO Department</div>
            </div>
      </div>
    </div>

    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="dashboard3.html" class="sidebar-item"><i data-lucide="layout-grid"></i><span>Dashboard Overview</span></a>
      <a href="reports3.html" class="sidebar-item active"><i data-lucide="alert-triangle"></i><span>Public Reports</span></a>
      <a href="announcements3.html" class="sidebar-item"><i data-lucide="megaphone"></i><span>Announcement Manager</span></a>
      <a href="weather.html" class="sidebar-item"><i data-lucide="thermometer-sun"></i><span>Weather & AQI Alerts</span></a>
      <a href="evacuation.html" class="sidebar-item"><i data-lucide="tent"></i><span>Evacuation Control</span></a>
    </nav>
    <div class="user-footer">
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-3"><div id="nav-avatar" class="nav-avatar bg-orange-600">D</div><div><div class="user-footer-name">DRRMO</div><div class="user-footer-sub">Disaster Management</div></div></div>
            <a href="profile3.html" class="settings-link"><i data-lucide="settings" class="icon-md"></i></a>
        </div>
        <button type="button" onclick="doLogout()" class="btn-logout"><i data-lucide="log-out" class="icon-sm"></i> Logout</button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-[#0a0e1a] h-full overflow-hidden">
    
    <header class="px-5 md:px-8 h-[76px] flex items-center shrink-0 theme-surface theme-border-b">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white transition-colors p-1">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg md:text-xl font-semibold text-white flex items-center gap-2">
            <i data-lucide="alert-triangle" class="icon-lg hidden md:inline-block"></i> Public Reports
        </h1>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-5 md:p-8 animate-in">
        <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between mb-6 md:mb-8">
            <div class="w-full sm:w-auto">
              <input type="date" id="filter-date" class="w-full sm:w-auto h-10 bg-[#1e2536] text-white border border-[#374151] rounded-lg px-3 text-sm outline-none cursor-pointer min-w-[160px]">
            </div>
            <button type="button" onclick="openModal('new-report-modal')" class="w-full sm:w-auto h-10 bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-lg text-sm font-bold flex items-center justify-center gap-2 shadow-lg transition-colors"><i data-lucide="plus" class="icon-sm"></i> File Incident</button>
        </div>
        
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6" id="reports-grid">
            <p id="empty-state-msg" class="text-[#94a3b8] text-sm italic col-span-full">No emergency reports fetched for this view currently.</p>
        </div>
    </div>
  </main>

  <div id="new-report-modal" class="modal-overlay hidden">
    <div class="border theme-border w-[550px] max-w-[90%] rounded-2xl p-6 md:p-8 max-h-[90vh] overflow-y-auto shadow-2xl theme-surface bg-[#0a0e1a]">
      <h2 class="text-white font-bold text-xl mb-6 flex items-center gap-2 justify-center"><i data-lucide="file-plus" class="text-blue-500 icon-lg"></i> Submit Incident</h2>
      
      <form id="new-report-form" class="space-y-4 text-left" onsubmit="handleNewReportSubmit(event)">
        <div>
          <label class="text-[10px] font-bold text-[#94a3b8] uppercase tracking-wider">Reporter Name</label>
          <input type="text" id="report-name" placeholder="Full name" class="w-full bg-[#0f172a] text-white border border-gray-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors" required>
        </div>
        <div>
          <label class="text-[10px] font-bold text-[#94a3b8] uppercase tracking-wider">Contact / Email</label>
          <input type="text" id="report-contact" placeholder="+63 9XX XXX XXXX or email" class="w-full bg-[#0f172a] text-white border border-gray-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors" required>
        </div>
        <div>
          <label class="text-[10px] font-bold text-[#94a3b8] uppercase tracking-wider">Location</label>
          <input type="text" id="report-location" placeholder="Exact address or landmark" class="w-full bg-[#0f172a] text-white border border-gray-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors" required>
        </div>
        <div>
          <label class="text-[10px] font-bold text-[#94a3b8] uppercase tracking-wider">Subject / Incident Type</label>
          <input type="text" id="report-subject" placeholder="e.g. Flooding, Landslide, Fire" class="w-full bg-[#0f172a] text-white border border-gray-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors" required>
        </div>
        <div>
          <label class="text-[10px] font-bold text-[#94a3b8] uppercase tracking-wider">Description</label>
          <textarea id="report-desc" rows="4" placeholder="Detailed description of the incident..." class="w-full bg-[#0f172a] text-white border border-gray-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors resize-none" required></textarea>
        </div>
        
        <div class="flex justify-end gap-3 mt-8 pt-4">
          <button type="button" onclick="closeModal('new-report-modal')" class="px-6 bg-[#1e2536] border theme-border text-white font-bold py-2.5 rounded-xl text-sm hover:bg-gray-800 transition-colors">Cancel</button>
          <button type="submit" class="px-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-lg transition-all">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <div id="view-report-modal" class="modal-overlay hidden" onclick="closeModal('view-report-modal')">
    <div class="border theme-border w-[450px] max-w-[90%] rounded-2xl p-6 md:p-8 shadow-2xl text-left max-h-[90vh] overflow-y-auto theme-surface bg-[#0a0e1a]" onclick="event.stopPropagation()">
      <h2 id="modal-detail-title" class="text-white font-bold text-xl md:text-2xl mb-4"></h2>
      <div id="modal-detail-info" class="bg-[#1e2536] p-4 rounded-xl text-sm text-[#94a3b8] mb-6 border theme-border space-y-2"></div>
      <p id="modal-detail-desc" class="text-slate-300 leading-relaxed"></p>
      <button type="button" onclick="closeModal('view-report-modal')" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition-colors shadow-lg">Close</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    lucide.createIcons(); 
    
    // 🚨 Mobile Sidebar Toggle Function 🚨
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
    }
    
    function doLogout() { 
        localStorage.removeItem('activeDepartment'); 
        window.location.href = 'admin.html'; 
    }

    function openModal(id) {
        document.getElementById(id).classList.remove('hidden');
    }

    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
    }

    function handleNewReportSubmit(event) {
        event.preventDefault(); 

        const name = document.getElementById('report-name').value;
        const contact = document.getElementById('report-contact').value;
        const location = document.getElementById('report-location').value;
        const subject = document.getElementById('report-subject').value;
        const desc = document.getElementById('report-desc').value;

        const emptyMsg = document.getElementById('empty-state-msg');
        if (emptyMsg) emptyMsg.remove();

        const grid = document.getElementById('reports-grid');
        
        const date = new Date();
        const dateString = date.toLocaleDateString();
        const timeString = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        const safeSubj = escapeHTML(subject);
        const safeDesc = escapeHTML(desc);
        const safeLoc = escapeHTML(location);
        const safeName = escapeHTML(name);
        const safeContact = escapeHTML(contact);

        const cardId = 'report_' + Date.now();

        const cardHTML = `
            <div id="${cardId}" class="report-card border border-gray-700 rounded-xl p-6 shadow-sm flex flex-col h-full relative cursor-pointer hover:border-blue-500/50 transition-colors bg-[#0f172a]" 
                 onclick="openReportDetails('${safeSubj}', '${dateString} ${timeString}', '${safeDesc}', '${safeLoc}', '${safeName}', '${safeContact}')">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs font-bold text-gray-400">${dateString}</p>
                        <p class="text-xs text-gray-500">${timeString}</p>
                    </div>
                    <span class="status-badge bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">New</span>
                </div>
                <h3 class="text-lg font-bold text-white mb-4 truncate">${safeSubj}</h3>
                <div class="space-y-1 text-sm mb-6">
                    <p class="truncate"><span class="text-[#94a3b8]">Name:</span> <span class="text-white font-semibold">${safeName}</span></p>
                    <p class="truncate"><span class="text-[#94a3b8]">Location:</span> <span class="text-white font-semibold">${safeLoc}</span></p>
                </div>
                <div class="text-sm mb-6">
                    <p class="text-[#94a3b8] mb-1">Description:</p>
                    <p class="text-slate-300 leading-relaxed line-clamp-3">${safeDesc}</p>
                </div>
                
                <div class="mt-auto pt-4 border-t border-gray-700 action-container" onclick="event.stopPropagation()">
                    <button type="button" onclick="markAsResolved('${cardId}')" class="w-full bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white border border-emerald-500/30 font-bold py-2 rounded-lg text-[10px] uppercase tracking-widest transition-colors">
                        Mark as Resolved
                    </button>
                </div>
            </div>
        `;

        grid.insertAdjacentHTML('afterbegin', cardHTML);

        event.target.reset();
        closeModal('new-report-modal');
    }

    function markAsResolved(cardId) {
        const card = document.getElementById(cardId);
        if (!card) return;

        const badge = card.querySelector('.status-badge');
        if (badge) {
            badge.innerText = 'Resolved';
            badge.className = 'status-badge bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest';
        }

        const actionContainer = card.querySelector('.action-container');
        if (actionContainer) {
            actionContainer.innerHTML = `
                <div class="w-full text-center text-emerald-500 font-bold py-2 text-[10px] uppercase tracking-widest flex justify-center items-center gap-1.5">
                    <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Resolved
                </div>
            `;
            lucide.createIcons();
        }
    }

    function openReportDetails(subject, datetime, desc, location, name, contact) {
        document.getElementById('modal-detail-title').innerText = subject;
        document.getElementById('modal-detail-info').innerHTML = `
            <p><strong class="text-white">Reported:</strong> ${datetime}</p>
            <p><strong class="text-white">By:</strong> ${name} (${contact})</p>
            <p><strong class="text-white">Location:</strong> ${location}</p>
        `;
        document.getElementById('modal-detail-desc').innerText = desc;
        openModal('view-report-modal');
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }
  </script>
</body>
</html>
