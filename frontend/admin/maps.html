<!doctype html>
<html lang="en" class="h-full">
<head>
  <script>
    (function() {
        const session = localStorage.getItem('activeDepartment');
        if (!session || session !== 'Main Admin') window.location.replace('admin.html?error=unauthorized'); 
    })();

    // Mobile Map Stats Toggle Logic
    window.toggleStatsPanel = function() {
        const content = document.getElementById('stats-panel-content');
        const chevron = document.getElementById('stats-chevron');
        if (content.classList.contains('mobile-hidden')) {
            content.classList.remove('mobile-hidden');
            if(chevron) chevron.classList.add('rotate-180');
        } else {
            content.classList.add('mobile-hidden');
            if(chevron) chevron.classList.remove('rotate-180');
        }
    };
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: 'DM Sans', sans-serif !important; overflow: hidden; background-color: #0a0e1a; }

    /* Map Base Styles */
    .map-wrapper { position: relative; flex-grow: 1; width: 100%; height: 100%; background: #070d19; overflow: hidden; }
    #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

    /* Map Legend */
    .map-legend { position: absolute; bottom: 30px; right: 20px; z-index: 10; background: rgba(10, 22, 40, 0.95); border: 1px solid #374151; border-radius: 12px; padding: 15px; display: grid; gap: 8px; pointer-events: none; backdrop-filter: blur(12px); }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; color: white; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .section-label { color: #94a3b8; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Status-Based Markers */
    .hazard-marker-pending { width: 24px; height: 24px; background-color: #f59e0b; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 20px rgba(245, 158, 11, 0.8); animation: pulse-amber 2s infinite; cursor: pointer; }
    @keyframes pulse-amber { 0% { box-shadow: 0 0 0 0 rgba(245,158,11, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(245,158,11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245,158,11, 0); } }

    .hazard-marker-active { width: 24px; height: 24px; background-color: #ef4444; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 20px rgba(239, 68, 68, 0.8); animation: pulse-red 2s infinite; cursor: pointer; }
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239,68,68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239,68,68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68, 0); } }

    .weather-blue-marker { width: 20px; height: 20px; background-color: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 20px rgba(59, 130, 246, 0.8); animation: pulse-blue 2s infinite; cursor: pointer; }
    @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59,130,246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59,130,246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246, 0); } }

    .weather-yellow-marker { width: 20px; height: 20px; background-color: #eab308; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(234, 179, 8, 0.8); animation: pulse-yellow 2s infinite; cursor: pointer; }
    @keyframes pulse-yellow { 0% { box-shadow: 0 0 0 0 rgba(234,179,8, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(234,179,8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234,179,8, 0); } }

    /* Custom Popup Colors */
    .popup-traffic .mapboxgl-popup-content { background: #1e293b !important; color: white !important; border: 1px solid #ef4444; border-radius: 8px; padding: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 240px; }
    .popup-traffic .mapboxgl-popup-tip { border-top-color: #1e293b !important; border-bottom-color: #1e293b !important; }
    
    .popup-blue .mapboxgl-popup-content { background: #1e293b !important; color: white !important; border: 1px solid #3b82f6; border-radius: 8px; padding: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 220px; }
    .popup-blue .mapboxgl-popup-tip { border-top-color: #1e293b !important; border-bottom-color: #1e293b !important; }

    .popup-yellow .mapboxgl-popup-content { background: #1e293b !important; color: white !important; border: 1px solid #eab308; border-radius: 8px; padding: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 220px; }
    .popup-yellow .mapboxgl-popup-tip { border-top-color: #1e293b !important; border-bottom-color: #1e293b !important; }

    .mapboxgl-popup-close-button { color: #94a3b8; font-size: 16px; top: 4px; right: 8px; }
    .mapboxgl-popup-close-button:hover { color: white; background: transparent; }

    /* Responsive Accordion logic */
    @media (max-width: 1023px) {
        .mobile-hidden { display: none !important; }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
        if(window.lucide) lucide.createIcons();

        mapboxgl.accessToken = 'pk.eyJ1IjoicmFmYWVsMDQxNiIsImEiOiJjbW5rZnJkbmUweTJ0MnZwcmx5OG5kaW5jIn0.uwnBow8wYc1idVnUbZEkag';
        const map = new mapboxgl.Map({
            container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [121.0825, 14.5764], zoom: 12.5, pitch: 45
        });

        let mapObjects = {};
        window.mapObjectsRescues = {}; 

        map.on('load', () => {
            map.addSource('live-traffic', { type: 'vector', url: 'mapbox://mapbox.mapbox-traffic-v1' });
            map.addLayer({
                'id': 'traffic-lines', 'type': 'line', 'source': 'live-traffic', 'source-layer': 'traffic',
                'paint': { 'line-width': 3, 'line-color': [ 'match', ['get', 'congestion'], 'low', '#4ade80', 'moderate', '#facc15', 'heavy', '#f87171', 'severe', '#334155', 'transparent' ]}
            });

            map.addSource('synced-blocked-lines', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
            map.addLayer({ 'id': 'synced-blocked-stroke', 'type': 'line', 'source': 'synced-blocked-lines', 'layout': { 'line-join': 'round', 'line-cap': 'round' }, 'paint': { 'line-color': ['match', ['get', 'status'], 'pending', '#f59e0b', 'active', '#ef4444', '#ef4444'], 'line-width': 6, 'line-dasharray': [2, 2] } });

            map.addSource('synced-danger-zones', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
            map.addLayer({ 'id': 'synced-danger-fill', 'type': 'fill', 'source': 'synced-danger-zones', 'paint': { 'fill-color': ['match', ['get', 'status'], 'pending', '#f59e0b', 'active', '#ef4444', '#ef4444'], 'fill-opacity': 0.25 } });
            map.addLayer({ 'id': 'synced-danger-stroke', 'type': 'line', 'source': 'synced-danger-zones', 'paint': { 'line-color': ['match', ['get', 'status'], 'pending', '#f59e0b', 'active', '#ef4444', '#ef4444'], 'line-width': 3, 'line-dasharray': [2, 2] } });

            map.addSource('synced-drrmo-drawn', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
            map.addLayer({ 'id': 'synced-drrmo-drawn-fill', 'type': 'fill', 'source': 'synced-drrmo-drawn', 'paint': { 'fill-color': '#3b82f6', 'fill-opacity': 0.3 } });
            map.addLayer({ 'id': 'synced-drrmo-drawn-stroke', 'type': 'line', 'source': 'synced-drrmo-drawn', 'paint': { 'line-color': '#3b82f6', 'line-width': 3, 'line-dasharray': [2, 2] } });

            map.addSource('synced-rescue-routes', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
            map.addLayer({
                'id': 'synced-rescue-routes-highlight', 'type': 'line', 'source': 'synced-rescue-routes',
                'layout': { 'line-join': 'round', 'line-cap': 'round' },
                'paint': { 'line-color': '#eab308', 'line-width': 12, 'line-opacity': 0.3 }
            });
            map.addLayer({
                'id': 'synced-rescue-routes-line', 'type': 'line', 'source': 'synced-rescue-routes',
                'layout': { 'line-join': 'round', 'line-cap': 'round' },
                'paint': { 'line-color': '#eab308', 'line-width': 4, 'line-dasharray': [2, 2] }
            });

            renderLiveHazards();
            renderLiveRescues(); 
        });

        function renderLiveHazards() {
            if(!map.getSource('synced-blocked-lines')) return;

            let hazards = JSON.parse(localStorage.getItem('beat_live_hazards')) || [];
            let drrmoZones = JSON.parse(localStorage.getItem('beat_drrmo_zones')) || [];
            
            Object.values(mapObjects).forEach(obj => {
                if(obj.marker) obj.marker.remove();
                if(obj.popup) obj.popup.remove();
            });
            mapObjects = {};

            const trafficList = document.getElementById('traffic-incidents-list');
            const weatherList = document.getElementById('weather-incidents-list');
            trafficList.innerHTML = '';
            weatherList.innerHTML = '';

            let trafficCount = 0, weatherCount = 0;
            let lineFeatures = [], dangerZoneFeatures = [], blueZoneFeatures = [];

            const activeHazards = hazards.filter(h => h.status !== 'rejected');
            activeHazards.forEach(hazard => {
                if (hazard.source === 'weather' || hazard.source === 'evacuation') return; 

                trafficCount++;
                const isPending = hazard.status === 'pending';
                const statusClass = isPending ? 'border-amber-500/50 border-l-amber-500' : 'border-red-500/30 border-l-red-500';
                const markerClass = isPending ? 'hazard-marker-pending' : 'hazard-marker-active';
                const badge = isPending ? '<span class="text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded text-[9px] border border-amber-500/20 font-bold uppercase tracking-wider">Requires HQ Approval</span>' : '<span class="text-white bg-red-600 px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">AVOID THIS AREA</span>';

                if(trafficList) trafficList.innerHTML += `
                    <div class="bg-[#1e2536] border p-3 rounded-lg border-l-4 ${statusClass} mb-3">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="text-white text-xs font-bold">${hazard.title}</h4>
                        </div>
                        <p class="text-[10px] text-gray-400 leading-tight mb-2">${hazard.desc}</p>
                        ${badge}
                    </div>
                `;

                const el = document.createElement('div'); el.className = markerClass;
                const popupHTML = `
                    <div class="pb-1 mb-1 border-b border-gray-600 flex items-center gap-2"><i data-lucide="car" class="text-red-500 w-3 h-3"></i><span class="text-[10px] font-bold uppercase tracking-widest text-[#94a3b8]">TRAFFIC DEPT</span></div>
                    <h3 class="font-bold text-white text-sm mb-1">${hazard.title}</h3>
                    <p class="text-[10px] text-gray-300 leading-snug mb-2">${hazard.desc}</p>
                    <div class="flex flex-col gap-1 mt-2 text-[9px] font-bold tracking-wider">
                        <span class="text-[#ef4444] bg-[#ef4444]/10 px-2 py-1 rounded text-center border border-[#ef4444]/20">AVOID THIS AREA</span>
                    </div>
                `;
                
                const popup = new mapboxgl.Popup({ offset: 25, closeButton: true, closeOnClick: false, className: 'popup-traffic' }).setHTML(popupHTML);
                const marker = new mapboxgl.Marker(el).setLngLat(hazard.center).setPopup(popup).addTo(map);
                mapObjects[hazard.id] = { marker, popup };

                if (hazard.blockedLine) { hazard.blockedLine.properties = { status: hazard.status }; lineFeatures.push(hazard.blockedLine); }
                if (hazard.dangerZone) { hazard.dangerZone.properties = { status: hazard.status }; dangerZoneFeatures.push(hazard.dangerZone); }
            });

            drrmoZones.forEach(zone => {
                weatherCount++;
                if(weatherList) weatherList.innerHTML += `
                    <div class="bg-[#1e2536] border p-3 rounded-lg border-l-4 border-blue-500/50 border-l-blue-500 mb-3">
                        <h4 class="text-white text-xs font-bold mb-1 truncate pr-2">${zone.title || zone.type}</h4>
                        <p class="text-[10px] text-gray-400 leading-tight mb-2">${zone.desc}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-blue-400 bg-blue-500/10 px-2 py-1 rounded text-center border border-blue-500/20 font-bold uppercase tracking-wider text-[9px]">TYPE: ${zone.type.toUpperCase()}</span>
                        </div>
                    </div>
                `;

                const el = document.createElement('div'); el.className = `weather-blue-marker`;
                const popupHTML = `
                    <div class="pb-1 mb-1 border-b border-gray-600 flex items-center gap-2"><i data-lucide="map-pin" class="text-blue-500 w-3 h-3"></i><span class="text-[10px] font-bold uppercase tracking-widest text-[#94a3b8]">DRRMO ZONE</span></div>
                    <h3 class="font-bold text-white text-sm mb-1">${zone.title || zone.type}</h3>
                    <p class="text-[10px] text-gray-300 leading-snug mb-2">${zone.desc}</p>
                    <div class="flex flex-col gap-1 mt-2 text-[9px] font-bold tracking-wider">
                        <span class="text-blue-400 bg-blue-500/10 px-2 py-1 rounded text-center border border-blue-500/20">TYPE: ${zone.type.toUpperCase()}</span>
                    </div>
                `;
                
                const popup = new mapboxgl.Popup({ offset: 25, closeButton: true, closeOnClick: false, className: 'popup-blue' }).setHTML(popupHTML);
                const marker = new mapboxgl.Marker(el).setLngLat(zone.center).setPopup(popup).addTo(map);
                mapObjects['zone_' + zone.id] = { marker, popup };

                blueZoneFeatures.push(zone.polygon);
            });

            document.getElementById('traffic-count').innerText = trafficCount;
            document.getElementById('weather-count').innerText = weatherCount;
            
            map.getSource('synced-blocked-lines').setData({ 'type': 'FeatureCollection', 'features': lineFeatures });
            map.getSource('synced-danger-zones').setData({ 'type': 'FeatureCollection', 'features': dangerZoneFeatures });
            map.getSource('synced-drrmo-drawn').setData({ 'type': 'FeatureCollection', 'features': blueZoneFeatures });
            
            if (window.lucide) lucide.createIcons();
        }

        function renderLiveRescues() {
            if(!map.getSource('synced-rescue-routes')) return;
            
            let rescues = JSON.parse(localStorage.getItem('beat_live_rescues')) || [];
            const list = document.getElementById('rescue-incidents-list');
            list.innerHTML = '';
            document.getElementById('rescue-count').innerText = rescues.length;

            Object.values(window.mapObjectsRescues || {}).forEach(obj => {
                if(obj.marker) obj.marker.remove();
                if(obj.popup) obj.popup.remove();
            });
            window.mapObjectsRescues = {};

            let routeFeatures = [];

            rescues.forEach(op => {
                list.innerHTML += `
                    <div class="bg-[#1e2536] border p-3 rounded-lg border-l-4 border-yellow-500/50 border-l-yellow-500 mb-3">
                        <h4 class="text-white text-xs font-bold mb-1 truncate pr-2">${op.name}</h4>
                        <p class="text-[10px] text-gray-400 leading-tight mb-2">To: ${op.targetName}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-yellow-400 bg-yellow-500/10 px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">ACTIVE MOVEMENT</span>
                        </div>
                    </div>
                `;

                const el = document.createElement('div'); el.className = `weather-yellow-marker`;
                const popupHTML = `
                    <div class="pb-1 mb-1 border-b border-gray-600 flex items-center gap-2"><i data-lucide="life-buoy" class="text-yellow-500 w-3 h-3"></i><span class="text-[10px] font-bold uppercase tracking-widest text-[#94a3b8]">MOVEMENT</span></div>
                    <h3 class="font-bold text-white text-sm mb-1">${op.name}</h3>
                    <p class="text-[10px] text-gray-300 leading-snug mb-2">Evacuating ~${op.evacuees} people to ${op.targetName}.</p>
                `;
                
                const popup = new mapboxgl.Popup({ offset: 25, closeButton: true, closeOnClick: false, className: 'popup-yellow' }).setHTML(popupHTML);
                const marker = new mapboxgl.Marker(el).setLngLat(op.pickupCoords).setPopup(popup).addTo(map);
                window.mapObjectsRescues[op.id] = { marker, popup };
                if (op.route) routeFeatures.push(op.route);
            });

            map.getSource('synced-rescue-routes').setData({ type: 'FeatureCollection', features: routeFeatures });
            if (window.lucide) lucide.createIcons();
        }

        window.addEventListener('storage', (e) => {
