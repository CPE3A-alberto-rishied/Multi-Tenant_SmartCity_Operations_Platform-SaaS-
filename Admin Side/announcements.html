<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAT - Announcement Manager</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles2.css">
  <style>
    .sidebar-item { font-size: 14px !important; }
    .sidebar-item.active { background: rgba(37, 99, 235, 0.15) !important; color: #3b82f6 !important; border-left: 4px solid #2563eb !important; }
  </style>
</head>
<body class="h-full flex bg-[#0a0e1a]">
  <aside id="sidebar" class="sidebar flex flex-col h-full">
    <div class="p-5 border-b" style="border-color:var(--border)">
      <div class="flex items-center gap-3">
        <div style="background:var(--accent);width:36px;height:36px;border-radius:10px" class="flex items-center justify-center font-bold text-white text-sm">B</div>
        <div><div class="font-bold text-lg tracking-widest text-white">BEAT</div><div style="color:var(--text-dim);font-size:11px">Admin Control Center</div></div>
      </div>
    </div>
    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="dashboard.html" class="sidebar-item"><i data-lucide="layout-grid"></i><span>Dashboard Overview</span></a>
      <a href="manage_admin.html" class="sidebar-item"><i data-lucide="users"></i><span>Manage Admins</span></a>
      <a href="reports.html" class="sidebar-item"><i data-lucide="alert-triangle"></i><span>Public Reports</span></a>
      <a href="announcements.html" class="sidebar-item active"><i data-lucide="megaphone"></i><span>Announcement Manager</span></a>
      <a href="traffic.html" class="sidebar-item"><i data-lucide="car"></i><span>Traffic and Road Control</span></a>
      <a href="analytics.html" class="sidebar-item"><i data-lucide="bar-chart-3"></i><span>Analytics & Audit</span></a>
    </nav>
    <div class="p-5 border-t mt-auto" style="border-color:var(--border)">
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-3">
          <div id="nav-avatar" style="background:#2563eb;width:42px;height:42px;border-radius:50%;background-size:cover;" class="flex items-center justify-center text-white font-bold text-sm">MA</div>
          <div><div class="text-sm font-bold text-white">Main Admin</div><div style="color:#94a3b8;font-size:11px">System Administrator</div></div>
        </div>
        <a href="profile.html" class="text-[#94a3b8] hover:text-blue-500 transition-colors"><i data-lucide="settings" style="width:18px;height:18px"></i></a>
      </div>
      <button onclick="doLogout()" class="w-full flex items-center justify-center gap-2 py-2 rounded-xl border border-gray-700 hover:bg-gray-800 transition-colors text-sm font-semibold text-white"><i data-lucide="log-out" style="width:16px;height:16px"></i> Logout</button>
    </div>
  </aside>
  <main class="flex-1 overflow-y-auto"><header class="px-8 py-5 border-b" style="border-color:var(--border);background:var(--surface)"><h1 class="text-xl font-semibold text-white">Announcement Manager</h1></header><div class="p-8 animate-in"><button class="btn btn-primary">Create Article</button></div></main>
  <script src="js/app.js"></script><script>lucide.createIcons();</script>
</body>
</html>
