<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BEAT – Analytics & Audit</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- ✅ GOOGLE FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles2.css">

  <!-- ✅ FORCE FONT CONSISTENCY -->
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
    }
    .font-mono {
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>

<body class="h-full">
<div class="flex h-full">

  <!-- SIDEBAR -->
  <aside class="sidebar flex flex-col">
    <div class="p-5 border-b" style="border-color:var(--border)">
      <div class="flex items-center gap-3">
        <div style="background:var(--accent);width:36px;height:36px;border-radius:10px"
             class="flex items-center justify-center font-bold text-white text-sm font-mono">
          B
        </div>
        <div>
          <div class="font-bold text-lg">BEAT</div>
          <div style="color:var(--text-dim);font-size:11px">Admin Control Center</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="dashboard.html" class="sidebar-item" style="text-decoration:none;">
        <i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i>
        <span>Dashboard Overview</span>
      </a>

      <a href="manage_admin.html" class="sidebar-item" style="text-decoration:none;">
        <i data-lucide="users" style="width:18px;height:18px;"></i>
        <span>Manage Admins</span>
      </a>

      <a href="reports.html" class="sidebar-item" style="text-decoration:none;">
        <i data-lucide="alert-triangle" style="width:18px;height:18px;"></i>
        <span>Public Reports</span>
      </a>

      <a href="announcements.html" class="sidebar-item" style="text-decoration:none;">
        <i data-lucide="megaphone" style="width:18px;height:18px;"></i>
        <span>Announcement Manager</span>
      </a>

      <a href="traffic.html" class="sidebar-item" style="text-decoration:none;">
        <i data-lucide="car" style="width:18px;height:18px;"></i>
        <span>Traffic and Road Control</span>
      </a>

      <a href="analytics.html" class="sidebar-item active" style="text-decoration:none;">
        <i data-lucide="bar-chart-3" style="width:18px;height:18px;"></i>
        <span>Analytics & Audit</span>
      </a>
    </nav>
    
<div class="p-5 border-t mt-auto" style="border-color:var(--border)">
  <button
    class="btn btn-ghost w-full justify-center text-sm"
    style="padding:8px;"
    onclick="doLogout()">
    <i data-lucide="log-out" style="width:16px;height:16px"></i>
    Logout
  </button>
</div>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-y-auto">
    <header class="px-8 py-5 border-b" style="border-color:var(--border);background:var(--surface)">
      <h1 class="text-xl font-semibold flex items-center gap-2">
        <i data-lucide="bar-chart-3"></i>
        Analytics & Audit
      </h1>
    </header>

    <div class="p-8 grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in">

      <div class="card">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
          <i data-lucide="scroll-text" style="color:var(--accent)"></i>
          Audit Trail
        </h3>
        <ul style="font-size:13px;color:var(--text-dim)" class="space-y-2">
          <li>Admin approved report</li>
          <li>Traffic status updated</li>
          <li>Announcement published</li>
        </ul>
      </div>

      <div class="card">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
          <i data-lucide="activity" style="color:var(--accent)"></i>
          Reports Overview
        </h3>

        <div class="flex items-end gap-3 h-40">
          <div class="chart-bar flex-1" style="height:40%"></div>
          <div class="chart-bar flex-1" style="height:65%"></div>
          <div class="chart-bar flex-1" style="height:50%"></div>
          <div class="chart-bar flex-1" style="height:80%"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  lucide.createIcons();
</script>
</body>
</html>
