      <select onchange="changeSortByStatus(this.value)" style="width:auto;padding:8px 12px;font-size:13px">
        <option value="all">All Status</option>
        <option value="New">New</option>
        <option value="Forwarded">Forwarded</option>

    <button class="btn btn-primary btn-sm" onclick="navigateTo('reports-manual')"><i data-lucide="plus" style="width:14px;height:14px"></i> New Report</button>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    </div>
