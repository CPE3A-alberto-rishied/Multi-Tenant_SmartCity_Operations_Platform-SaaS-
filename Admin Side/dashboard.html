<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAT - Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles2.css">
 </head>
 <body class="h-full">
  
  <div class="flex h-full">
   
   <aside id="sidebar" class="sidebar flex flex-col">
    <div class="p-5 border-b" style="border-color:var(--border)">
     <div class="flex items-center gap-3">
      <div style="background:var(--accent);width:36px;height:36px;border-radius:10px" class="flex items-center justify-center font-bold text-white text-sm">B</div>
      <div>
       <div class="font-bold text-lg tracking-widest">BEAT</div>
       <div style="color:var(--text-dim);font-size:11px">Admin Control Center</div>
      </div>
     </div>
    </div>
    
    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="dashboard.html" class="sidebar-item active" style="text-decoration:none;">
          <i data-lucide="layout-dashboard" style="width:18px;height:18px;flex-shrink:0;"></i>
          <span>Dashboard Overview</span>
      </a>
      <a href="manage_admin.html" class="sidebar-item" style="text-decoration:none;">
          <i data-lucide="users" style="width:18px;height:18px;flex-shrink:0;"></i>
          <span>Manage Admins</span>
      </a>
      <a href="reports.html" class="sidebar-item" style="text-decoration:none;">
          <i data-lucide="alert-triangle" style="width:18px;height:18px;flex-shrink:0;"></i>
          <span>Public Reports</span>
      </a>
      <a href="announcements.html" class="sidebar-item" style="text-decoration:none;">
          <i data-lucide="megaphone" style="width:18px;height:18px;flex-shrink:0;"></i>
          <span>Announcement Manager</span>
      </a>
      <a href="traffic.html" class="sidebar-item" style="text-decoration:none;">
          <i data-lucide="car" style="width:18px;height:18px;flex-shrink:0;"></i>
          <span>Traffic and Road Control</span>
      </a>
      <a href="analytics.html" class="sidebar-item" style="text-decoration:none;">
          <i data-lucide="bar-chart-3" style="width:18px;height:18px;flex-shrink:0;"></i>
          <span>Analytics & Audit</span>
      </a>
    </nav>

    <div class="p-5 border-t mt-auto" style="border-color:var(--border)">
     <button class="btn btn-ghost w-full justify-center text-sm" style="padding: 8px;" onclick="doLogout()">
      <i data-lucide="log-out" style="width:16px;height:16px"></i> Logout
     </button>
    </div>
   </aside>

   <main class="flex-1 overflow-y-auto h-full flex flex-col">
    <header class="flex items-center justify-between px-8 py-5 border-b" style="border-color:var(--border);background:var(--surface)">
     <div class="flex items-center gap-3">
      <button class="btn-ghost btn btn-sm lg:hidden" onclick="toggleSidebar()"><i data-lucide="menu" style="width:20px;height:20px"></i></button>
      <h1 class="font-semibold text-xl">Dashboard Overview</h1>
     </div>
    </header>
    
    <div class="p-8 flex-1 animate-in">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
        <div class="card">
          <div style="color:var(--text-dim);font-size:12px;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px">ACTIVE INCIDENTS</div>
          <div id="dash-active-incidents" class="font-bold text-4xl mb-2" style="color:var(--danger)">0</div>
          <div style="color:var(--text-dim);font-size:13px">Live count</div>
        </div>
      </div>
      
      <div class="card lg:col-span-2">
        <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
          <i data-lucide="activity" style="width:18px;height:18px;color:var(--accent)"></i> Recent Activity Feed
        </h3>
        <div id="dash-activity-feed" class="space-y-2"></div>
      </div>

    </div>
   </main>
  </div>

  <script src="js/app.js"></script>
  <script>
      // When this specific page loads, run the dashboard code
      document.addEventListener('DOMContentLoaded', () => {
          populateDashboard();
          lucide.createIcons();
      });
  </script>
 </body>
</html>
